name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build

    runs-on: windows-2022

    steps:
    - name: Get the version
      id: get_version
      run: echo ::set-output name=version::${GITHUB_REF#refs/tags/}
      shell: bash

    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11.3"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ./PySimpleGUI-4.59.0-py3-none-any.whl
        python -m pip install -e .[gui,dev]
        # Replace pydantic with no-binary version to lightweight target binary a bit
        # python -m pip uninstall -y pydantic
        # python -m pip install --no-binary pydantic pydantic>=1.9.0

    - name: Build standalone app
      run: |
        python setup.py build_standalone

    - name: Archive Windows distributive
      run: pushd dist && 7z a ../Parser2GIS-${{steps.get_version.outputs.version}}-windows.zip Parser2GIS.exe && popd
      shell: bash

    - name: Upload distributive
      uses: actions/upload-artifact@v4
      with:
        name: dist-windows
        path: Parser2GIS-*
        retention-days: 5

  release:
    name: Release

    needs: [build]

    runs-on: ubuntu-latest

    steps:
    - name: Get the version
      id: get_version
      run: |
        echo ::set-output name=version::${GITHUB_REF#refs/tags/v}
      shell: bash

    - uses: actions/checkout@v3

    - name: Get Changelog Entry
      id: changelog_reader
      uses: mindsers/changelog-reader-action@v2
      with:
        version: ${{ steps.get_version.outputs.version }}
        path: ./CHANGELOG.md

    - uses: actions/download-artifact@v4

    - uses: ncipollo/release-action@v1.10.0
      with:
        tag: v${{ steps.changelog_reader.outputs.version }}
        name: Parser2GIS ${{ steps.changelog_reader.outputs.version }}
        body: ${{ steps.changelog_reader.outputs.changes }}
        prerelease: ${{ steps.changelog_reader.outputs.status == 'prereleased' }}
        draft: true
        artifacts: "dist-windows/*"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
